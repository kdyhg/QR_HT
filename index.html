<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하트 QR코드 메이커</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
        :root { 
            --primary: #3182F6; 
            --glass: rgba(255, 255, 255, 0.25); 
            --text-main: #1d1d1f;
            --text-sub: #444;
        }
        
        body {
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: linear-gradient(135deg, #aed6f1, #d7bde2, #ffadbb);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            width: 100%;
            max-width: 480px; 
            padding: 40px; 
            border-radius: 30px;
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h2 { margin-top: 0; color: var(--text-main); font-weight: 800; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-sub); font-weight: 600; }
        
        input[type="text"] {
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.8); 
            box-sizing: border-box; 
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .flex-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        
        select, input[type="color"] {
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.5); 
            background: #fff; 
            cursor: pointer;
            height: 42px;
            box-sizing: border-box;
        }

        button {
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            background: var(--primary);
            color: white; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(49, 130, 246, 0.3); }
        button:active { transform: translateY(0); }

        #preview-box {
            margin-top: 25px; 
            background: #fff; 
            border-radius: 20px; 
            padding: 25px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 320px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        canvas { max-width: 100%; height: auto; border-radius: 10px; }

        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-sub { background: rgba(0,0,0,0.08); color: #333; padding: 12px; font-size: 14px; flex: 1; border-radius: 12px; }
        .btn-sub:hover { background: rgba(0,0,0,0.15); }

        /* 제작자 표기 스타일 */
        .footer-credit {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            color: #555;
        }
        .footer-credit strong { color: #222; }
        .footer-credit a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .footer-credit a:hover { opacity: 0.7; text-decoration: underline; }

        /* 메시지 알림 박스 */
        #status-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; bottom: 20px; } to { opacity: 1; bottom: 30px; } }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>QR 코드 제작</h2>
    
    <div class="input-group">
        <label>연결할 URL</label>
        <input type="text" id="urlInput" placeholder="https://www.google.com" value="https://www.google.com">
    </div>

    <div class="flex-row">
        <div style="flex:1; min-width: 120px; text-align:left;">
            <label>모양</label>
            <select id="shapeSelect" style="width:100%">
                <option value="square">기본 사각형</option>
                <option value="heart" selected>하트</option>
            </select>
        </div>
        <div style="text-align:left;">
            <label>QR 색상</label>
            <input type="color" id="fgColor" value="#000000">
        </div>
        <div style="text-align:left;">
            <label>배경 색상</label>
            <input type="color" id="bgColor" value="#ffffff">
        </div>
    </div>

    <button onclick="generateQR()">QR 코드 생성</button>
    
    <div id="preview-box">
        <canvas id="qrCanvas"></canvas>
    </div>

    <div class="action-btns">
        <button class="btn-sub" onclick="copyClipboard()">클립보드 복사</button>
        <button class="btn-sub" onclick="savePNG()">PNG 저장</button>
    </div>

    <!-- 제작자 표기 영역 -->
    <div class="footer-credit">
        제작: <strong>동티</strong> | 
        <a href="https://blog.naver.com/math_dt" target="_blank" rel="noopener">블로그 방문하기</a>
    </div>
</div>

<div id="status-msg"></div>

<script>
    function showMessage(text) {
        const msgBox = document.getElementById('status-msg');
        msgBox.innerText = text;
        msgBox.style.display = 'block';
        setTimeout(() => {
            msgBox.style.display = 'none';
        }, 2000);
    }

    function generateQR() {
        const url = document.getElementById('urlInput').value;
        const shape = document.getElementById('shapeSelect').value;
        const fgColor = document.getElementById('fgColor').value;
        const bgColor = document.getElementById('bgColor').value;
        const canvas = document.getElementById('qrCanvas');
        const ctx = canvas.getContext('2d');

        if (!url) {
            showMessage("URL을 입력해주세요.");
            return;
        }

        const qr = qrcode(0, 'H');
        qr.addData(url);
        qr.make();

        const count = qr.getModuleCount();
        const cellSize = 12; 
        const qrSize = count * cellSize;

        // QR 밀도 기반 확률 계산
        const densityProbability = 0.5 + (count / 100) * 0.3;

        if (shape === "square") {
            canvas.width = qrSize + 60;
            canvas.height = qrSize + 60;
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.setTransform(1, 0, 0, 1, 30, 30);
            drawMatrix(qr, ctx, count, cellSize, fgColor);
        } else {
            const canvasSize = qrSize * 1.8;
            canvas.width = canvasSize;
            canvas.height = canvasSize;
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 하트 중심 이동 및 회전
            ctx.setTransform(1, 0, 0, 1, canvas.width / 2, canvas.height / 2 + qrSize / 5);
            ctx.rotate(45 * Math.PI / 180);

            ctx.translate(-qrSize / 2, -qrSize / 2);
            drawMatrix(qr, ctx, count, cellSize, fgColor);

            drawLobe(ctx, qrSize / 2, 0, qrSize / 2, fgColor, cellSize, "top", densityProbability);
            drawLobe(ctx, 0, qrSize / 2, qrSize / 2, fgColor, cellSize, "left", densityProbability);
        }
        
        // Reset transform
        ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function drawMatrix(qr, ctx, count, cellSize, color) {
        ctx.fillStyle = color;
        for (let r = 0; r < count; r++) {
            for (let c = 0; c < count; c++) {
                if (qr.isDark(r, c)) {
                    ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                }
            }
        }
    }

    function drawLobe(ctx, cx, cy, radius, color, cellSize, side, probability) {
        ctx.fillStyle = color;
        for (let x = -radius; x <= radius; x += cellSize) {
            for (let y = -radius; y <= radius; y += cellSize) {
                if (Math.sqrt(x * x + y * y) <= radius) {
                    const isInsideLobe = (side === "top" && y <= 0) || (side === "left" && x <= 0);
                    if (isInsideLobe && Math.random() < probability) {
                        ctx.fillRect(cx + x, cy + y, cellSize, cellSize);
                    }
                }
            }
        }
    }

    async function copyClipboard() {
        const canvas = document.getElementById('qrCanvas');
        try {
            canvas.toBlob(async (blob) => {
                try {
                    const item = new ClipboardItem({ "image/png": blob });
                    await navigator.clipboard.write([item]);
                    showMessage("클립보드에 복사되었습니다!");
                } catch (err) {
                    showMessage("복사에 실패했습니다. PNG 저장을 이용해주세요.");
                }
            });
        } catch (e) {
            showMessage("지원되지 않는 브라우저입니다.");
        }
    }

    function savePNG() {
        const canvas = document.getElementById('qrCanvas');
        const link = document.createElement('a');
        link.download = 'dongti_heart_qr.png';
        link.href = canvas.toDataURL();
        link.click();
        showMessage("이미지가 저장되었습니다.");
    }

    window.onload = generateQR;
</script>

</body>
</html>
